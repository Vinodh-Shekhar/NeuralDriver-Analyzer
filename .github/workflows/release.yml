name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $sigFile) {
            Write-Host "::warning::No .nsis.zip.sig found — updater signing may not be configured. Skipping latest.json."
            exit 0
          }
          $version = "${{ github.ref_name }}".TrimStart('v')
          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          $zipName = $sigFile.Name.Replace('.sig', '')
          $baseUrl = "https://github.com/Vinodh-Shekhar/FrameBench-Analyzer/releases/download/${{ github.ref_name }}"
          $json = [ordered]@{
            version  = $version
            notes    = "See the release on GitHub for details."
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$baseUrl/$zipName"
              }
            }
          } | ConvertTo-Json -Depth 5
          $json | Set-Content "latest.json"
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"

      - name: Copy installer with stable filename
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "FrameBench-Analyzer-Setup.exe"
          Write-Host "Copied $($exe.Name) -> FrameBench-Analyzer-Setup.exe"

      - name: Set release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = switch ($tag) {
            "v1.0.6" {
@"
## v1.0.6 — Release Pipeline & Landing Page Overhaul

### Bug Fixes
- **Fixed broken download**: Release workflow now always uploads `FrameBench-Analyzer-Setup.exe` even when updater signing is unavailable — previously the workflow crashed before uploading any files, causing 404 on every download link
- **Fixed lint errors in AnimatedGraph**: Replaced ternary expression-statements with `if/else` blocks to satisfy `@typescript-eslint/no-unused-expressions` — CI was failing on every push

### Improvements
- **New updater signing key**: Regenerated `TAURI_SIGNING_PRIVATE_KEY` and updated the public key in `tauri.conf.json` — auto-update checks will now work correctly for users on v1.0.6+
- **Resilient release workflow**: `Generate latest.json` step now skips gracefully when no `.sig` file is found instead of crashing the entire pipeline; added `fail_on_unmatched_files: false` so optional artifacts (zip, sig, latest.json) don't block the installer upload
- **Redesigned landing page**: Full visual overhaul aligned with the app's design system
  - Added sticky navbar with brand logo, section anchors (Features, Use Cases, Download), and download CTA
  - Hero section: restructured headline, stats row (2–3 driver builds, 16+ metrics, 0 cloud dependencies), GitHub link replacing placeholder demo link
  - AnimatedGraph now renders dual waveforms — Driver A (green) vs Driver B (accent) — with a live metrics footer showing Avg FPS / Stutter / Score comparison
  - Download section: corrected download URL to `releases/latest/download/FrameBench-Analyzer-Setup.exe`, added version badge and feature tiles
  - Footer: removed all placeholder `#` links; now only contains real links — Release Notes, README, GitHub, Issues, License
- **Vercel deployment**: Added `vercel.json` at repo root to correctly set build command and output directory for the `landing-page/` sub-app
- **MIT License**: Added `LICENSE` file to the repository

### Auto-Update
Users on v1.0.5 and below will see an in-app update prompt on next launch.
"@
            }
            "v1.0.5" {
@"
## v1.0.5 — Landing Page Launch & CI Fixes

### New
- **Landing page**: Launched marketing landing page (`landing-page/`) built with React + Vite + Tailwind, deployed to GitHub Pages
  - Hero section with animated frame-time graph, feature highlights, and download CTA
  - Core Capabilities, Differentiation, Use Cases, Feature Deep Dive, Comparison Showcase, and Download sections
  - Sticky footer with navigation links
- **CI pipeline**: Updated CI workflow to run lint, typecheck, and Vite build on every push and PR

### Bug Fixes
- Fixed `webviewInstallMode` documentation contradiction in CLAUDE.md — `embedBootstrapper` is the only correct value
- Removed stale Electron build job from CI (release.yml handles all Windows builds)

### Internal
- Synced all pending uncommitted changes (landing page assets, config files, lock files)
- Updated CLAUDE.md with auto-update system docs, release workflow docs, and landing page rules
"@
            }
            "v1.0.4" {
@"
## v1.0.4 — Direct Download & Landing Page Fixes

### Improvements
- **Fixed download URL**: Installer is now copied to a stable filename `FrameBench-Analyzer-Setup.exe` and uploaded as a release asset — landing page download buttons now use `releases/latest/download/FrameBench-Analyzer-Setup.exe` for a permanent, version-independent link
- **Landing page navigation**: Fixed section anchor IDs so navbar links scroll correctly to Features and Use Cases
- **Landing page buttons**: Added `target="_blank"` and `rel="noopener noreferrer"` to all external links; fixed analyzer app link to use relative path (`analyzer/`) for GitHub Pages compatibility
- **Removed dead footer links**: Eliminated placeholder `href="#"` links from the landing page footer
- **Dynamic versioning**: App footer now reads version at runtime via `invoke('get_app_info')` instead of being hardcoded — version displayed always matches the actual binary
- **CI**: Updated Node.js to `lts/*` in the CI workflow
"@
            }
            "v1.0.3" {
@"
## v1.0.3 — Release Pipeline Fix

### Bug Fixes
- **Fixed release workflow**: Replaced broken `tauri-action` with an explicit `tauri build` + `softprops/action-gh-release` pipeline — previous releases were not producing downloadable artifacts
- Removed stale Electron build job that was causing CI confusion
"@
            }
            "v1.0.2" {
@"
## v1.0.2 — Release Workflow Rebuild

### Bug Fixes
- **Rebuilt release pipeline from scratch**: Switched from `tauri-action` to manual `npm run tauri:build` + `softprops/action-gh-release@v2` to reliably produce signed NSIS installers
- Updated footer credit

### Internal
- Version is now read dynamically from `CARGO_PKG_VERSION` via `get_app_info` Tauri command
"@
            }
            "v1.0.1" {
@"
## v1.0.1 — Auto-Update System

### New
- **In-app auto-update**: Added `tauri-plugin-updater` — app checks for new versions on launch and shows a non-blocking green banner with "Update" / "Later" actions
- **GitHub Actions release workflow**: `.github/workflows/release.yml` now builds, signs, and creates a GitHub Release on every `v*` tag push; generates `latest.json` for the updater endpoint
- **Update banner UI**: Non-intrusive banner appears at the top of the app when a newer version is available; clicking "Update" triggers download and install via the NSIS installer
"@
            }
            default {
              "See the assets below to download this version and install it."
            }
          }
          $notes | Set-Content "release_notes.md"
          Write-Host "Release notes written for $tag"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: FrameBench Analyzer ${{ github.ref_name }}
          body_path: release_notes.md
          fail_on_unmatched_files: false
          files: |
            FrameBench-Analyzer-Setup.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
