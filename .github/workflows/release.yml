name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $sigFile) {
            Write-Host "::warning::No .nsis.zip.sig found — updater signing may not be configured. Skipping latest.json."
            exit 0
          }
          $version = "${{ github.ref_name }}".TrimStart('v')
          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          $zipName = $sigFile.Name.Replace('.sig', '')
          $baseUrl = "https://github.com/Vinodh-Shekhar/FrameBench-Analyzer/releases/download/${{ github.ref_name }}"
          $json = [ordered]@{
            version  = $version
            notes    = "See the release on GitHub for details."
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$baseUrl/$zipName"
              }
            }
          } | ConvertTo-Json -Depth 5
          $json | Set-Content "latest.json"
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"

      - name: Copy installer with stable filename
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "FrameBench-Analyzer-Setup.exe"
          Write-Host "Copied $($exe.Name) -> FrameBench-Analyzer-Setup.exe"

      - name: Write release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $v107 = "## v1.0.7 - Bug Fixes and Landing Page Improvements`n`n" +
            "### Bug Fixes`n" +
            "- **Fixed 'asset not found: index.html' in release builds**: vite.config.ts was using the GITHUB_ACTIONS env var (auto-set on all CI runs) to switch the Vite base path and outDir for GitHub Pages. This caused the Tauri release build to output to dist/analyzer/ with base /FrameBench-Analyzer/analyzer/ — making WebView2 unable to find index.html. Fixed by replacing the GITHUB_ACTIONS condition with a dedicated BUILD_FOR_WEB env var that is only set in the Pages deploy step of main.yml.`n" +
            "- **Fixed download URL always pointing to v1.0.6**: DownloadSection.tsx had a hardcoded versioned release URL instead of the stable releases/latest/download/ permalink. Now always serves the newest installer without requiring a landing page update on every release.`n`n" +
            "### Auto-Update`n" +
            "Users on v1.0.6 and below will see an in-app update prompt on next launch."
          $v106 = "## v1.0.6 - Release Pipeline and Landing Page Overhaul`n`n" +
            "### Bug Fixes`n" +
            "- **Fixed broken download**: Release workflow now always uploads FrameBench-Analyzer-Setup.exe even when updater signing is unavailable. Previously the workflow crashed before uploading any files, causing a 404 on every download link.`n" +
            "- **Fixed lint errors in AnimatedGraph**: Replaced ternary expression-statements with if/else blocks to satisfy @typescript-eslint/no-unused-expressions - CI was failing on every push.`n`n" +
            "### Improvements`n" +
            "- **New updater signing key**: Regenerated TAURI_SIGNING_PRIVATE_KEY and updated the public key in tauri.conf.json - auto-update checks will now work correctly for users on v1.0.6+`n" +
            "- **Resilient release workflow**: Generate latest.json step now skips gracefully when no .sig file is found; added fail_on_unmatched_files: false so optional artifacts do not block the installer upload`n" +
            "- **Redesigned landing page**: Full visual overhaul aligned with the app design system`n" +
            "  - Sticky navbar with brand logo, section anchors, and download CTA`n" +
            "  - Hero section with restructured headline, stats row, and GitHub link`n" +
            "  - AnimatedGraph now renders dual waveforms - Driver A (green) vs Driver B (accent) with live metrics footer`n" +
            "  - Download section: corrected download URL and version badge`n" +
            "  - Footer: removed all placeholder links, now only real links (Release Notes, README, GitHub, Issues, License)`n" +
            "- **Vercel deployment**: Added vercel.json to correctly configure the landing-page sub-app build and output directory`n" +
            "- **MIT License**: Added LICENSE file to the repository`n`n" +
            "### Auto-Update`n" +
            "Users on v1.0.5 and below will see an in-app update prompt on next launch."
          $v105 = "## v1.0.5 - Landing Page Launch and CI Fixes`n`n" +
            "### New`n" +
            "- Launched marketing landing page (landing-page/) built with React + Vite + Tailwind, deployed to GitHub Pages`n" +
            "- Hero section with animated frame-time graph, feature highlights, and download CTA`n" +
            "- Core Capabilities, Differentiation, Use Cases, Feature Deep Dive, Comparison Showcase, and Download sections`n" +
            "- Updated CI workflow to run lint, typecheck, and Vite build on every push and PR`n`n" +
            "### Bug Fixes`n" +
            "- Fixed webviewInstallMode documentation contradiction - embedBootstrapper is the correct value`n" +
            "- Removed stale Electron build job from CI"
          $v104 = "## v1.0.4 - Direct Download and Landing Page Fixes`n`n" +
            "### Improvements`n" +
            "- Fixed download URL: installer now copied to stable filename FrameBench-Analyzer-Setup.exe uploaded as a release asset`n" +
            "- Landing page download buttons use releases/latest/download/FrameBench-Analyzer-Setup.exe for a permanent version-independent link`n" +
            "- Fixed landing page navigation section anchor IDs`n" +
            "- Added target=_blank and rel=noopener noreferrer to all external links`n" +
            "- Fixed analyzer app link to use relative path for GitHub Pages compatibility`n" +
            "- Removed placeholder href=# links from footer`n" +
            "- App footer now reads version dynamically via invoke('get_app_info') instead of hardcoding`n" +
            "- Updated Node.js to lts/* in CI workflow"
          $v103 = "## v1.0.3 - Release Pipeline Fix`n`n" +
            "### Bug Fixes`n" +
            "- Fixed release workflow: replaced broken tauri-action with explicit build + softprops release pipeline`n" +
            "- Removed stale Electron build job that was causing CI confusion"
          $v102 = "## v1.0.2 - Release Workflow Rebuild`n`n" +
            "### Bug Fixes`n" +
            "- Rebuilt release pipeline from scratch using manual npm run tauri:build + softprops/action-gh-release@v2`n" +
            "- Updated footer credit`n`n" +
            "### Internal`n" +
            "- Version is now read dynamically from CARGO_PKG_VERSION via get_app_info Tauri command"
          $v101 = "## v1.0.1 - Auto-Update System`n`n" +
            "### New`n" +
            "- In-app auto-update: added tauri-plugin-updater - app checks for new versions on launch and shows a non-blocking update banner`n" +
            "- GitHub Actions release workflow: builds, signs, and creates a GitHub Release on every v* tag push; generates latest.json for the updater endpoint`n" +
            "- Update banner UI: non-intrusive banner appears when a newer version is available with Update / Later actions"
          $notes = switch ($tag) {
            "v1.0.7" { $v107 }
            "v1.0.6" { $v106 }
            "v1.0.5" { $v105 }
            "v1.0.4" { $v104 }
            "v1.0.3" { $v103 }
            "v1.0.2" { $v102 }
            "v1.0.1" { $v101 }
            default  { "See the assets below to download this version." }
          }
          $notes | Set-Content "release_notes.md" -Encoding UTF8
          Write-Host "Release notes written for $tag"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: FrameBench Analyzer ${{ github.ref_name }}
          body_path: release_notes.md
          fail_on_unmatched_files: false
          files: |
            FrameBench-Analyzer-Setup.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
